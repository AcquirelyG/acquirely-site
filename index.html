<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acquirely - Lead Generation & Automation Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #120d05, #000000);
  color: #f5f5f5;
  overflow-x: hidden;
}

/* ================= PREMIUM ANIMATED LOGO ================= */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 3px;
  cursor: pointer;

  background: linear-gradient(
    120deg,
    #ffd700,
    #fff2a6,
    #b8860b,
    #ffd700
  );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;

  animation: logoShimmer 4s ease-in-out infinite, floatLogo 3s ease-in-out infinite;
}

/* shimmer movement */
@keyframes logoShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* floating effect */
@keyframes floatLogo {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  align-items: center;
  position: sticky;
  top: 0;
  background: rgba(10,7,3,0.7);
  backdrop-filter: blur(10px);
  z-index: 1000;
  border-bottom: 1px solid rgba(255,215,0,0.25);
}

nav a {
  color: #fff;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: gold;
}

.cta-btn {
  background: linear-gradient(135deg, #ffd700, #b8860b);
  color: black;
  padding: 10px 16px;
  border-radius: 10px;
  font-weight: 800;
  margin-left: 15px;
  text-decoration: none;
  transition: 0.3s;
}

.cta-btn:hover {
  transform: scale(1.05);
}

/* SECTIONS */
section {
  padding: 90px 60px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* HERO */
.hero {
  text-align: center;
  padding-top: 140px;
  position: relative;
  overflow: hidden;
}

/* 🔥 GOLD ENERGY GLOW BEHIND HERO */
.hero::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,215,0,0.18), transparent 60%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(40px);
  z-index: 0;
  animation: pulseGlow 6s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.2); }
}

.hero h1 {
  font-size: 52px;
  margin-bottom: 20px;
  position: relative;
  z-index: 2;
}

.hero p {
  color: #d6c9a1;
  font-size: 18px;
  position: relative;
  z-index: 2;
}

/* 🌌 PARTICLE CANVAS */
#particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 40px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,215,0,0.2);
  padding: 25px;
  border-radius: 16px;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px rgba(255,215,0,0.25);
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,7,3,0.95);
  border: 1px solid gold;
  padding: 10px;
  width: 90%;
  font-size: 12px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
}

.card:hover .tooltip {
  opacity: 1;
  bottom: -65px;
}

/* COUNTER */
.counter {
  font-size: 42px;
  color: gold;
  font-weight: 700;
}

/* CONTACT */
.contact-wrapper {
  display: flex;
  justify-content: center;
}

.contact-box {
  width: 100%;
  max-width: 500px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,215,0,0.25);
  padding: 30px;
  border-radius: 16px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

button {
  padding: 12px 20px;
  border: none;
  background: linear-gradient(135deg, #ffd700, #b8860b);
  color: black;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 800;
  margin-top: 10px;
}

/* WHATSAPP */
#wa-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
}

#wa-button {
  width: 60px;
  height: 60px;
  background: #25D366;
  color: white;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(37,211,102,0.6);
}

#wa-box {
  width: 260px;
  background: rgba(10,7,3,0.95);
  border: 1px solid rgba(37,211,102,0.4);
  border-radius: 12px;
  position: absolute;
  bottom: 75px;
  right: 0;
  display: none;
}

.wa-header {
  background: #25D366;
  color: black;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  font-weight: 600;
}

.wa-body {
  padding: 12px;
  font-size: 13px;
  color: white;
}

.wa-body a {
  display: inline-block;
  margin-top: 10px;
  background: #25D366;
  color: black;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Acquirely</div>

  <div>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#pricing">Pricing</a>
    <a href="#contact">Contact</a>

    <a class="cta-btn" href="#contact">Get Started</a>
    <a class="cta-btn" target="_blank" href="https://wa.me/6288211592253">WhatsApp</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero show">
  <canvas id="particles"></canvas>

  <h1>Elite Lead Generation Systems</h1>
  <p>We build automated outbound machines that generate predictable revenue.</p>
</section>

<!-- (ALL YOUR OTHER SECTIONS UNCHANGED) -->

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <div class="contact-wrapper">
    <div class="contact-box">

      <form id="contactForm">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>

      <p id="status" style="margin-top:10px;"></p>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer style="text-align:center;padding:40px;margin-top:80px;border-top:1px solid rgba(255,215,0,0.2);background:rgba(0,0,0,0.6);">
  <div style="color:gold;font-weight:800;">ACQUIRELY</div>
  <p style="color:#999;font-size:12px;margin-top:10px;">© 2026 Acquirely</p>
</footer>

<script>

/* ================= PARTICLE SYSTEM (LIGHTWEIGHT) ================= */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];
let w, h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = document.querySelector(".hero").offsetHeight;
}
resize();
window.addEventListener("resize", resize);

for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*w,
    y: Math.random()*h,
    r: Math.random()*2,
    dx: (Math.random()-0.5)*0.3,
    dy: (Math.random()-0.5)*0.3
  });
}

function animate(){
  ctx.clearRect(0,0,w,h);

  particles.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0 || p.x>w) p.dx *= -1;
    if(p.y<0 || p.y>h) p.dy *= -1;

    ctx.fillStyle = "rgba(255,215,0,0.6)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

/* SCROLL */
const sections = document.querySelectorAll("section");
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => e.isIntersecting && e.target.classList.add("show"));
},{ threshold: 0.2 });

sections.forEach(s => observer.observe(s));

/* COUNTER */
let started = false;
function runCounters(){
  if(started) return;
  started = true;

  document.querySelectorAll(".counter").forEach(el => {
    let t = +el.dataset.target;
    let c = 0;

    let speed = Math.max(1, Math.floor(t / 120));

    let i = setInterval(() => {
      c += speed;
      el.innerText = c;
      if(c >= t){
        el.innerText = t;
        clearInterval(i);
      }
    }, 10);
  });
}

new IntersectionObserver(e=>{
  e.forEach(x=>x.isIntersecting && runCounters());
},{threshold:0.5}).observe(document.querySelector("#about"));

/* WHATSAPP */
function toggleWA(){
  let box = document.getElementById("wa-box");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

/* FORM */
document.getElementById("contactForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Sending...";

  await fetch("https://script.google.com/macros/s/AKfycbxzo2354GJb4dpmjU0jem566K4tqMFcP5LQGqdtmcC8vXOhX0JLgMOXadLb410cqVEqMA/exec", {
    method: "POST",
    body: new FormData(e.target)
  });

  status.innerText = "Message sent successfully!";
  e.target.reset();
});

</script>

</body>
</html>
