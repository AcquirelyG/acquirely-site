<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Brand</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

  <!-- NAVBAR -->
  <nav class="bg-white shadow-md fixed w-full top-0 left-0 z-50">
    <div class="max-w-6xl mx-auto px-4">

      <div class="flex justify-between items-center h-16">

        <!-- Logo -->
        <div class="text-xl font-bold">
          MyBrand
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-8">
          <a href="#" class="hover:text-blue-500">Home</a>
          <a href="#" class="hover:text-blue-500">Services</a>
          <a href="#" class="hover:text-blue-500">About</a>
          <a href="#" class="hover:text-blue-500">Contact</a>
        </div>

        <!-- Mobile Button -->
        <button id="menu-btn" class="md:hidden flex flex-col space-y-1">
          <span class="w-6 h-0.5 bg-black"></span>
          <span class="w-6 h-0.5 bg-black"></span>
          <span class="w-6 h-0.5 bg-black"></span>
        </button>

      </div>

      <!-- Mobile Menu -->
      <div id="mobile-menu" class="hidden md:hidden flex flex-col space-y-4 pb-4">
        <a href="#" class="hover:text-blue-500">Home</a>
        <a href="#" class="hover:text-blue-500">Services</a>
        <a href="#" class="hover:text-blue-500">About</a>
        <a href="#" class="hover:text-blue-500">Contact</a>
      </div>

    </div>
  </nav>

  <!-- HERO SECTION -->
  <section class="pt-24 text-center px-6">
    <h1 class="text-4xl font-bold mb-4">Grow Your Business</h1>
    <p class="text-gray-600 mb-6">
      We help you get more clients without ads.
    </p>

    <a href="#" class="bg-blue-500 text-white px-6 py-3 rounded-full">
      Get Started
    </a>
  </section>

  <!-- SIMPLE SCRIPT -->
  <script>
    const btn = document.getElementById("menu-btn");
    const menu = document.getElementById("mobile-menu");

    btn.addEventListener("click", () => {
      menu.classList.toggle("hidden");
    });
  </script>

</body>
</html>
